<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebScraper Pro - Extract Content Like a Pro</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animated::before,
        .bg-animated::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }

        .bg-animated::before {
            width: 600px;
            height: 600px;
            background: var(--gradient-1);
            top: -300px;
            right: -300px;
            animation-delay: 0s;
        }

        .bg-animated::after {
            width: 800px;
            height: 800px;
            background: var(--gradient-3);
            bottom: -400px;
            left: -400px;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-50px, 50px) scale(0.9); }
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 800;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .navbar-brand:hover {
            transform: translateY(-2px);
            color: var(--primary-light);
        }

        .navbar-brand .logo {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .navbar-nav {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Hero Section */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 6rem 2rem 4rem;
            text-align: center;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            animation: fadeInUp 0.8s ease;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 3rem;
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem;
        }

        /* Glass Card */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-xl);
            animation: fadeInUp 0.8s ease 0.4s backwards;
        }

        /* Input Group */
        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1.25rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1rem 1rem 3.5rem;
            background: rgba(51, 65, 85, 0.5);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: rgba(51, 65, 85, 0.8);
        }

        /* Button */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem 2.5rem;
            background: var(--gradient-1);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-full {
            width: 100%;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Results Section */
        .results {
            margin-top: 3rem;
            display: none;
        }

        .results.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .results-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .results-count {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary-light);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        /* Grid */
        .grid {
            display: grid;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .grid-2 {
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        }

        /* Card */
        .card {
            background: rgba(51, 65, 85, 0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            background: rgba(51, 65, 85, 0.6);
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        /* Image Card */
        .image-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 16/9;
            background: rgba(51, 65, 85, 0.4);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .image-card:hover img {
            transform: scale(1.05);
        }

        .image-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-card:hover .image-overlay {
            opacity: 1;
        }

        /* Link Card */
        .link-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(51, 65, 85, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .link-card:hover {
            background: rgba(51, 65, 85, 0.6);
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .link-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .link-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        /* Video Card */
        .video-card {
            border-radius: 16px;
            overflow: hidden;
            background: rgba(51, 65, 85, 0.4);
        }

        .video-card video {
            width: 100%;
            border-radius: 12px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--gradient-1);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: var(--gradient-2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }

            .hero-subtitle {
                font-size: 1rem;
            }

            .glass-card {
                padding: 2rem 1.5rem;
            }

            .navbar-nav {
                display: none;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="#" class="navbar-brand">
                <div class="logo">
                    <i data-feather="zap"></i>
                </div>
                <span>WebScraper</span>
            </a>
            <ul class="navbar-nav">
                <li><a href="#" class="nav-link">Features</a></li>
                <li><a href="#" class="nav-link">Pricing</a></li>
                <li><a href="#" class="nav-link">Docs</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <h1 class="hero-title">Extract Web Content<br>Like a Pro</h1>
        <p class="hero-subtitle">
            Powerful web scraping tool to extract images, links, and videos from any website instantly.
        </p>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="glass-card">
            <!-- Input Section -->
            <div class="input-group">
                <label class="input-label">Website URL</label>
                <div class="input-wrapper">
                    <i class="input-icon" data-feather="globe"></i>
                    <input 
                        type="text" 
                        id="urlInput" 
                        class="input-field"
                        placeholder="https://example.com"
                    >
                </div>
            </div>

            <button onclick="scrape()" class="btn btn-full" id="scrapeBtn">
                <span class="spinner"></span>
                <span class="btn-text">
                    <i data-feather="search"></i>
                    Extract Content
                </span>
            </button>

            <!-- Results Section -->
            <div class="results" id="resultsSection">
                <!-- Images -->
                <div id="imagesSection" style="display: none;">
                    <div class="results-header">
                        <div class="results-title">
                            <i data-feather="image"></i>
                            Images
                            <span class="results-count" id="imagesCount">0</span>
                        </div>
                    </div>
                    <div class="grid grid-2" id="images"></div>
                </div>

                <!-- Links -->
                <div id="linksSection" style="display: none;">
                    <div class="results-header">
                        <div class="results-title">
                            <i data-feather="link"></i>
                            Links
                            <span class="results-count" id="linksCount">0</span>
                        </div>
                    </div>
                    <div class="grid" id="links"></div>
                </div>

                <!-- Videos -->
                <div id="videosSection" style="display: none;">
                    <div class="results-header">
                        <div class="results-title">
                            <i data-feather="video"></i>
                            Videos
                            <span class="results-count" id="videosCount">0</span>
                        </div>
                    </div>
                    <div class="grid grid-2" id="videos"></div>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState">
                    <i data-feather="inbox"></i>
                    <div class="empty-state-title">No results yet</div>
                    <p>Enter a URL above and click "Extract Content" to get started</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <i data-feather="check-circle"></i>
        <span id="toastMessage">Success!</span>
    </div>

    <script>
        // Initialize Feather Icons
        feather.replace();

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.toggle('error', isError);
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function scrape() {
            const url = document.getElementById("urlInput").value.trim();
            
            if (!url) {
                showToast('Please enter a valid URL', true);
                return;
            }

            const btn = document.getElementById('scrapeBtn');
            const resultsSection = document.getElementById('resultsSection');
            const emptyState = document.getElementById('emptyState');
            
            // Show loading state
            btn.classList.add('loading');
            btn.disabled = true;
            
            fetch(`/api/scrap?url=${encodeURIComponent(url)}`)
                .then(res => {
                    if (!res.ok) throw new Error('Failed to scrape');
                    return res.json();
                })
                .then(data => {
                    // Hide loading state
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    
                    // Show results section
                    resultsSection.classList.add('active');
                    emptyState.style.display = 'none';
                    
                    // Display Images
                    const imagesSection = document.getElementById('imagesSection');
                    const imagesContainer = document.getElementById('images');
                    const imagesCount = document.getElementById('imagesCount');
                    
                    if (data.images && data.images.length > 0) {
                        imagesSection.style.display = 'block';
                        imagesCount.textContent = data.images.length;
                        imagesContainer.innerHTML = data.images.map(img => `
                            <div class="image-card">
                                <img src="${img}" alt="Scraped image" loading="lazy">
                                <div class="image-overlay">
                                    <a href="${img}" target="_blank" style="color: white; text-decoration: none;">
                                        <i data-feather="external-link"></i> Open
                                    </a>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        imagesSection.style.display = 'none';
                    }
                    
                    // Display Links
                    const linksSection = document.getElementById('linksSection');
                    const linksContainer = document.getElementById('links');
                    const linksCount = document.getElementById('linksCount');
                    
                    if (data.links && data.links.length > 0) {
                        linksSection.style.display = 'block';
                        linksCount.textContent = data.links.length;
                        linksContainer.innerHTML = data.links.map(link => `
                            <a href="${link}" target="_blank" class="link-card">
                                <div class="link-icon">
                                    <i data-feather="external-link"></i>
                                </div>
                                <span class="link-text">${link}</span>
                                <i data-feather="arrow-right" style="color: var(--text-muted);"></i>
                            </a>
                        `).join('');
                    } else {
                        linksSection.style.display = 'none';
                    }
                    
                    // Display Videos
                    const videosSection = document.getElementById('videosSection');
                    const videosContainer = document.getElementById('videos');
                    const videosCount = document.getElementById('videosCount');
                    
                    if (data.videos && data.videos.length > 0) {
                        videosSection.style.display = 'block';
                        videosCount.textContent = data.videos.length;
                        videosContainer.innerHTML = data.videos.map(v => `
                            <div class="video-card">
                                <video src="${v}" controls></video>
                            </div>
                        `).join('');
                    } else {
                        videosSection.style.display = 'none';
                    }
                    
                    // Reinitialize Feather Icons
                    feather.replace();
                    
                    showToast('Content extracted successfully!');
                })
                .catch(err => {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                    showToast('Failed to scrape website. Please try again.', true);
                    console.error(err);
                });
        }

        // Allow Enter key to trigger scrape
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                scrape();
            }
        });
    </script>
</body>
</html>
